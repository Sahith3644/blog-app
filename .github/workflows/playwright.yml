name: End-to-End Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up environment file
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" > .env.local
          echo "AUTH_SECRET=${AUTH_SECRET}" >> .env.local
          echo "AUTH_URL=${AUTH_URL}" >> .env.local
          echo "NEXTAUTH_URL=${NEXTAUTH_URL}" >> .env.local
          echo "NODE_ENV=test" >> .env.local

      - name: Verify environment setup
        run: |
          echo "DATABASE_URL exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "AUTH_SECRET exists: ${{ secrets.AUTH_SECRET != '' }}"
          cat .env.local | sed 's/=.*/=***/'

      - name: Run database migrations
        run: npx drizzle-kit push

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
